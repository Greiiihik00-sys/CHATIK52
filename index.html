<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #212121;
            --bg-secondary: #171717;
            --bg-tertiary: #2f2f2f;
            --bg-hover: #383838;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --border: #424242;
            --user-msg: #2f2f2f;
            --ai-msg: #444654;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 12px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
            color: var(--text-primary);
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: var(--bg-hover);
        }

        .chat-item.active {
            background: var(--bg-tertiary);
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .model-select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .welcome-screen h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .message {
            padding: 20px;
            display: flex;
            gap: 16px;
            line-height: 1.6;
        }

        .message:nth-child(odd) {
            background: var(--ai-msg);
        }

        .message:nth-child(even) {
            background: var(--bg-primary);
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: bold;
        }

        .user-avatar {
            background: #5436da;
        }

        .ai-avatar {
            background: var(--accent);
        }

        .message-content {
            flex: 1;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message-content p {
            margin-bottom: 10px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }

        .message-content p code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Input Area */
        .input-container {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 8px;
            resize: none;
            outline: none;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
        }

        .input-box textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            background: var(--bg-hover);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .input-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <span>+</span> Новый чат
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            OpenRouter API • AI Chat
        </div>
    </div>

    <div class="main">
        <div class="header">
            <select class="model-select" id="modelSelect">
                <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
                <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
                <option value="mistralai/mistral-7b-instruct">Mistral 7B</option>
                <option value="google/gemma-2-27b-it">Gemma 2 27B</option>
                <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
            </select>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Чем могу помочь?</h1>
                <p>Начните диалог с AI ассистентом</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">AI может допускать ошибки. Проверяйте важную информацию.</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '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';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

        let chats = {};
        let currentChatId = null;
        let isGenerating = false;

        // Auto-resize textarea
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function generateId() {
            return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function newChat() {
            const id = generateId();
            chats[id] = {
                id: id,
                title: 'Новый чат',
                messages: [],
                createdAt: Date.now()
            };
            currentChatId = id;
            renderChatList();
            renderMessages();
            messageInput.focus();
        }

        function switchChat(id) {
            currentChatId = id;
            renderChatList();
            renderMessages();
        }

        function deleteChat(id) {
            delete chats[id];
            if (currentChatId === id) {
                const keys = Object.keys(chats);
                currentChatId = keys.length > 0 ? keys[keys.length - 1] : null;
            }
            renderChatList();
            renderMessages();
        }

        function renderChatList() {
            const chatList = document.getElementById('chatList');
            const sortedChats = Object.values(chats).sort((a, b) => b.createdAt - a.createdAt);
            
            chatList.innerHTML = sortedChats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="switchChat('${chat.id}')">
                    ${escapeHtml(chat.title)}
                </div>
            `).join('');
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
                container.innerHTML = `
                    <div class="welcome-screen">
                        <h1>Чем могу помочь?</h1>
                        <p>Начните диалог с AI ассистентом</p>
                    </div>
                `;
                return;
            }

            const chat = chats[currentChatId];
            container.innerHTML = chat.messages.map((msg, i) => `
                <div class="message">
                    <div class="message-avatar ${msg.role === 'user' ? 'user-avatar' : 'ai-avatar'}">
                        ${msg.role === 'user' ? 'Вы' : 'AI'}
                    </div>
                    <div class="message-content">
                        ${formatMessage(msg.content)}
                    </div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(text) {
            // Simple markdown-like formatting
            let formatted = escapeHtml(text);
            
            // Code blocks
            formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Предопределённые ответы на определённые фразы
        const customResponses = {
            'как дела?': 'Иди в жопу',
            'как дела': 'Иди в жопу',
            'привет': 'Здарова',
            'здравствуй': 'Здарова',
            'что делаешь?': 'Тебе какое дело?',
            'что делаешь': 'Тебе какое дело?',
            'кто ты?': 'Я тот, кто пошлёт тебя нахуй',
            'кто ты': 'Я тот, кто пошлёт тебя нахуй',
            'помоги': 'Сам разбирайся',
            'помощь': 'Сам разбирайся',
        };

        function getCustomResponse(message) {
            const lowerMessage = message.toLowerCase().replace(/[?!.,]/g, '').trim();
            
            for (const [key, value] of Object.entries(customResponses)) {
                const normalizedKey = key.toLowerCase().replace(/[?!.,]/g, '').trim();
                if (lowerMessage === normalizedKey || lowerMessage.includes(normalizedKey)) {
                    return value;
                }
            }
            return null;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || isGenerating) return;

            // Create chat if needed
            if (!currentChatId) {
                newChat();
            }

            // Add user message
            const chat = chats[currentChatId];
            chat.messages.push({ role: 'user', content: text });
            
            // Update title from first message
            if (chat.messages.length === 1) {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                renderChatList();
            }

            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Show loading
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;
            renderMessages();
            
            // Add typing indicator
            const container = document.getElementById('messagesContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message';
            typingDiv.innerHTML = `
                <div class="message-avatar ai-avatar">AI</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;

            // Проверяем предопределённые ответы
            const customResponse = getCustomResponse(text);
            if (customResponse !== null) {
                // Убираем индикатор набора
                if (typingDiv.parentNode) {
                    container.removeChild(typingDiv);
                }
                
                chat.messages.push({ role: 'assistant', content: customResponse });
                renderMessages();
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
                return;
            }

            try {
                const model = document.getElementById('modelSelect').value;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'AI Chat'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chat.messages.map(m => ({ role: m.role, content: m.content })),
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Ошибка API');
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                // Remove typing indicator
                container.removeChild(typingDiv);
                
                // Add AI response
                chat.messages.push({ role: 'assistant', content: aiMessage });
                renderMessages();

            } catch (error) {
                // Remove typing indicator
                if (typingDiv.parentNode) {
                    container.removeChild(typingDiv);
                }
                
                chat.messages.push({ 
                    role: 'assistant', 
                    content: `Ошибка: ${error.message}. Проверьте API ключ и подключение к интернету.` 
                });
                renderMessages();
            } finally {
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // Initialize with a new chat
        newChat();
    </script>
</body>
</html>
