<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #212121; --bg-secondary: #171717; --bg-tertiary: #2f2f2f;
            --bg-hover: #383838; --text-primary: #ececec; --text-secondary: #b4b4b4;
            --accent: #10a37f; --accent-hover: #0d8c6d; --border: #424242; --ai-msg: #444654;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            height: 100vh; display: flex; overflow: hidden;
        }
        .sidebar {
            width: 260px; background: var(--bg-secondary); display: flex;
            flex-direction: column; border-right: 1px solid var(--border);
        }
        .sidebar-header { padding: 12px; }
        .new-chat-btn {
            display: flex; align-items: center; gap: 10px; padding: 12px;
            border: 1px dashed var(--border); border-radius: 8px; background: transparent;
            color: var(--text-primary); cursor: pointer; width: 100%; font-size: 14px; transition: background 0.2s;
        }
        .new-chat-btn:hover { background: var(--bg-hover); }
        .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item {
            padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px;
            color: var(--text-primary); transition: background 0.2s;
        }
        .chat-item:hover { background: var(--bg-hover); }
        .chat-item.active { background: var(--bg-tertiary); }
        .sidebar-footer {
            padding: 12px; border-top: 1px solid var(--border);
            font-size: 12px; color: var(--text-secondary);
        }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header {
            padding: 12px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .model-select {
            background: var(--bg-tertiary); color: var(--text-primary);
            border: 1px solid var(--border); padding: 8px 12px;
            border-radius: 6px; font-size: 14px; cursor: pointer;
        }
        .settings-btn {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-primary); padding: 8px 12px; border-radius: 6px;
            cursor: pointer; font-size: 18px; transition: background 0.2s;
        }
        .settings-btn:hover { background: var(--bg-hover); }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 90%; max-width: 500px;
        }
        .modal h2 { margin-bottom: 16px; font-size: 20px; }
        .modal label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
        .modal input[type="password"] {
            width: 100%; padding: 10px 12px; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-primary); font-size: 14px; outline: none;
        }
        .modal input[type="password"]:focus { border-color: var(--accent); }
        .modal-hint { font-size: 12px; color: var(--text-secondary); margin-top: 8px; margin-bottom: 16px; }
        .modal-hint a { color: var(--accent); }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btn {
            padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border);
            cursor: pointer; font-size: 14px; transition: background 0.2s;
        }
        .modal-btn-save { background: var(--accent); color: white; border: none; }
        .modal-btn-save:hover { background: var(--accent-hover); }
        .modal-btn-cancel { background: transparent; color: var(--text-primary); }
        .modal-btn-cancel:hover { background: var(--bg-hover); }
        .api-status { font-size: 12px; margin-top: 8px; margin-bottom: 16px; }
        .api-status.connected { color: var(--accent); }
        .api-status.disconnected { color: #ff6b6b; }
        .messages-container { flex: 1; overflow-y: auto; padding: 0; }
        .welcome-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; text-align: center; padding: 20px;
        }
        .welcome-screen h1 { font-size: 32px; margin-bottom: 10px; font-weight: 600; }
        .welcome-screen p { color: var(--text-secondary); font-size: 16px; }
        .message { padding: 20px; display: flex; gap: 16px; line-height: 1.6; }
        .message:nth-child(odd) { background: var(--ai-msg); }
        .message:nth-child(even) { background: var(--bg-primary); }
        .message-avatar {
            width: 32px; height: 32px; border-radius: 4px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: bold;
        }
        .user-avatar { background: #5436da; }
        .ai-avatar { background: var(--accent); }
        .message-content { flex: 1; font-size: 15px; word-wrap: break-word; }
        .message-content p { margin-bottom: 10px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content pre {
            background: #1a1a1a; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0;
        }
        .message-content code { font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; }
        .message-content p code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; }
        .input-container { padding: 20px; border-top: 1px solid var(--border); }
        .input-wrapper { max-width: 768px; margin: 0 auto; position: relative; }
        .input-box {
            display: flex; align-items: flex-end; background: var(--bg-tertiary);
            border: 1px solid var(--border); border-radius: 12px; padding: 8px;
        }
        .input-box textarea {
            flex: 1; background: transparent; border: none; color: var(--text-primary);
            font-size: 15px; padding: 8px; resize: none; outline: none;
            max-height: 200px; font-family: inherit; line-height: 1.5;
        }
        .input-box textarea::placeholder { color: var(--text-secondary); }
        .send-btn {
            width: 36px; height: 36px; border-radius: 8px; background: var(--accent);
            border: none; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { background: var(--bg-hover); cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; }
        .input-hint { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span {
            width: 8px; height: 8px; background: var(--text-secondary);
            border-radius: 50%; animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()"><span>+</span> Новый чат</button>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">OpenRouter API • AI Chat</div>
    </div>
    <div class="main">
        <div class="header">
            <div class="header-left">
                <button class="settings-btn" onclick="toggleSettings()" title="Настройки API">⚙️</button>
                <select class="model-select" id="modelSelect">
                    <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
                    <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
                    <option value="mistralai/mistral-7b-instruct">Mistral 7B</option>
                    <option value="google/gemma-2-27b-it">Gemma 2 27B</option>
                    <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
                </select>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Чем могу помочь?</h1>
                <p>Нажмите ⚙️ для ввода API ключа</p>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">AI может допускать ошибки. Проверяйте важную информацию.</div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Настройки API</h2>
            <label for="apiKeyInput">OpenRouter API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
            <div class="modal-hint">Получите ключ на <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></div>
            <div class="api-status" id="apiStatus"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="toggleSettings()">Отмена</button>
                <button class="modal-btn modal-btn-save" onclick="saveApiKey()">Сохранить</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        let API_KEY = localStorage.getItem('openrouter_api_key') || '';
        let chats = {};
        let currentChatId = null;
        let isGenerating = false;

        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function generateId() { return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

        function newChat() {
            const id = generateId();
            chats[id] = { id, title: 'Новый чат', messages: [], createdAt: Date.now() };
            currentChatId = id;
            renderChatList();
            renderMessages();
            messageInput.focus();
        }

        function switchChat(id) { currentChatId = id; renderChatList(); renderMessages(); }

        function renderChatList() {
            const chatList = document.getElementById('chatList');
            const sortedChats = Object.values(chats).sort((a, b) => b.createdAt - a.createdAt);
            chatList.innerHTML = sortedChats.map(chat =>
                `<div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="switchChat('${chat.id}')">${escapeHtml(chat.title)}</div>`
            ).join('');
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
                container.innerHTML = `<div class="welcome-screen"><h1>Чем могу помочь?</h1><p>${API_KEY ? 'Начните диалог с AI ассистентом' : 'Нажмите ⚙️ для ввода API ключа'}</p></div>`;
                return;
            }
            const chat = chats[currentChatId];
            container.innerHTML = chat.messages.map(msg => `
                <div class="message">
                    <div class="message-avatar ${msg.role === 'user' ? 'user-avatar' : 'ai-avatar'}">${msg.role === 'user' ? 'Вы' : 'AI'}</div>
                    <div class="message-content">${formatMessage(msg.content)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(text) {
            let f = escapeHtml(text);
            f = f.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            f = f.replace(/`([^`]+)`/g, '<code>$1</code>');
            f = f.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            f = f.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            f = f.replace(/\n/g, '<br>');
            return f;
        }

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        const customResponses = {
            'как дела?': 'Иди в жопу', 'как дела': 'Иди в жопу',
            'привет': 'Здарова', 'здравствуй': 'Здарова',
            'что делаешь?': 'Тебе какое дело?', 'что делаешь': 'Тебе какое дело?',
            'кто ты?': 'Я тот, кто пошлёт тебя нахуй', 'кто ты': 'Я тот, кто пошлёт тебя нахуй',
            'помоги': 'Сам разбирайся', 'помощь': 'Сам разбирайся',
        };

        function getCustomResponse(message) {
            const lm = message.toLowerCase().replace(/[?!.,]/g, '').trim();
            for (const [key, value] of Object.entries(customResponses)) {
                const nk = key.toLowerCase().replace(/[?!.,]/g, '').trim();
                if (lm === nk || lm.includes(nk)) return value;
            }
            return null;
        }

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                document.getElementById('apiKeyInput').value = API_KEY;
                updateApiStatus();
            }
        }

        function saveApiKey() {
            API_KEY = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('openrouter_api_key', API_KEY);
            updateApiStatus();
            setTimeout(() => toggleSettings(), 500);
        }

        function updateApiStatus() {
            const s = document.getElementById('apiStatus');
            if (API_KEY) { s.textContent = '✓ API ключ сохранён'; s.className = 'api-status connected'; }
            else { s.textContent = '✗ API ключ не введён'; s.className = 'api-status disconnected'; }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isGenerating) return;
            if (!currentChatId) newChat();
            const chat = chats[currentChatId];
            chat.messages.push({ role: 'user', content: text });
            if (chat.messages.length === 1) {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                renderChatList();
            }
            input.value = '';
            input.style.height = 'auto';
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;
            renderMessages();
            const container = document.getElementById('messagesContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message';
            typingDiv.innerHTML = '<div class="message-avatar ai-avatar">AI</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;

            const customResponse = getCustomResponse(text);
            if (customResponse !== null) {
                if (typingDiv.parentNode) container.removeChild(typingDiv);
                chat.messages.push({ role: 'assistant', content: customResponse });
                renderMessages();
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
                return;
            }

            if (!API_KEY) {
                if (typingDiv.parentNode) container.removeChild(typingDiv);
                chat.messages.push({ role: 'assistant', content: 'API ключ не установлен. Нажмите ⚙️ для настройки.' });
                renderMessages();
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
                return;
            }

            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'AI Chat'
                    },
                    body: JSON.stringify({
                        model,
                        messages: chat.messages.map(m => ({ role: m.role, content: m.content })),
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'Ошибка API');
                }
                const data = await response.json();
                if (typingDiv.parentNode) container.removeChild(typingDiv);
                chat.messages.push({ role: 'assistant', content: data.choices[0].message.content });
                renderMessages();
            } catch (error) {
                if (typingDiv.parentNode) container.removeChild(typingDiv);
                chat.messages.push({ role: 'assistant', content: `Ошибка: ${error.message}` });
                renderMessages();
            } finally {
                isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        newChat();
    </script>
</body>
</html>
